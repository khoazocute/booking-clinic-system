# Tên ứng dụng
spring.application.name=booking-clinic

# Cấu hình Port
server.port=8081

# Kết nối MySQL từ XAMPP (Có hỗ trợ Tiếng Việt UTF-8)
spring.datasource.url=jdbc:mysql://localhost:3306/booking_clinic_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Cấu hình Hibernate tự động tạo/cập nhật bảng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true 